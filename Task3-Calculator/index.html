<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <h1 class="page-title">
            Calculator
        </h1>
        <p class="page-sub">
            Perform basic arithmetic operations
        </p>
        <div class="calc-wrap">
            <div class="calculator">
                <div class="display">
                    <div class="display-expr" id="expression"></div>
                    <div class="display-val" id="display">
                        0 </div>
                </div>
                <div class="buttons">
                    <button class="btn btn-func" data-value="AC">AC</button>
                    <button class="btn btn-func" data-value="%">%</button>
                    <button class="btn btn-func" data-value=".">.</button>
                    <button class="btn btn-op" data-value="/">÷</button>
                    <button class="btn btn-num" data-value="7">7</button>
                    <button class="btn btn-num" data-value="8">8</button>
                    <button class="btn btn-num" data-value="9">9</button>
                    <button class="btn btn-op" data-value="*">×</button>
                    <button class="btn btn-num" data-value="4">4</button>
                    <button class="btn btn-num" data-value="5">5</button>
                    <button class="btn btn-num" data-value="6">6</button>
                    <button class="btn btn-op" data-value="-">−</button>
                    <button class="btn btn-num" data-value="1">1</button>
                    <button class="btn btn-num" data-value="2">2</button>
                    <button class="btn btn-num" data-value="3">3</button>
                    <button class="btn btn-op" data-value="+">+</button>
                    <button class="btn btn-num wide2" data-value="0">0</button>
                    <button class="btn btn-eq wide2" data-value="=">=</button>
                </div>
            </div>
        </div>
    </div>
     <div class="footer-credit">
      Developed by Sama Manoj Kumar
     </div>
    <script src="script.js"></script>
</body>
</html>
